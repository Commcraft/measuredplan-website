name: Deploy to GitHub Pages

# Builds the Astro site and deploys it to GitHub Pages on every push to master.
# Before the first run: repo Settings → Pages → Build and deployment →
# Source = "GitHub Actions". Custom domain (measuredplan.com) is set via the
# public/CNAME file in this repo plus the DNS records in the README.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # Defaults: npm ci + npm run build, uploads ./dist as the Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
